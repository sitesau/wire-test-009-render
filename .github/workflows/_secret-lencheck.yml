name: _secret-lencheck
on: { workflow_dispatch: {} }
jobs:
  lencheck:
    runs-on: ubuntu-latest
    steps:
      - name: lengths
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          DIGITAL_OCEAN_API_KEY: ${{ secrets.DIGITAL_OCEAN_API_KEY }}
          NEOCITIES_API_KEY: ${{ secrets.NEOCITIES_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDSITES_PAT: ${{ secrets.CLOUDSITES_PAT }}
        run: |
          printf 'LEN %s=%s\n' "NETLIFY_AUTH_TOKEN" "${#NETLIFY_AUTH_TOKEN}"
          printf 'LEN %s=%s\n' "VERCEL_TOKEN" "${#VERCEL_TOKEN}"
          printf 'LEN %s=%s\n' "AWS_ACCESS_KEY_ID" "${#AWS_ACCESS_KEY_ID}"
          printf 'LEN %s=%s\n' "AWS_SECRET_ACCESS_KEY" "${#AWS_SECRET_ACCESS_KEY}"
          printf 'LEN %s=%s\n' "AWS_DEFAULT_REGION" "${#AWS_DEFAULT_REGION}"
          printf 'LEN %s=%s\n' "SURGE_LOGIN" "${#SURGE_LOGIN}"
          printf 'LEN %s=%s\n' "SURGE_TOKEN" "${#SURGE_TOKEN}"
          printf 'LEN %s=%s\n' "RENDER_API_KEY" "${#RENDER_API_KEY}"
          printf 'LEN %s=%s\n' "DIGITAL_OCEAN_API_KEY" "${#DIGITAL_OCEAN_API_KEY}"
          printf 'LEN %s=%s\n' "NEOCITIES_API_KEY" "${#NEOCITIES_API_KEY}"
          printf 'LEN %s=%s\n' "CLOUDFLARE_API_TOKEN" "${#CLOUDFLARE_API_TOKEN}"
          printf 'LEN %s=%s\n' "CLOUDFLARE_ACCOUNT_ID" "${#CLOUDFLARE_ACCOUNT_ID}"
          printf 'LEN %s=%s\n' "SUPABASE_URL" "${#SUPABASE_URL}"
          printf 'LEN %s=%s\n' "SUPABASE_SERVICE_ROLE_KEY" "${#SUPABASE_SERVICE_ROLE_KEY}"
          printf 'LEN %s=%s\n' "CLOUDSITES_PAT" "${#CLOUDSITES_PAT}"
